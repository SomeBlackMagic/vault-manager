name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'

      - name: Get version and revision
        id: version
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "REVISION=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Install gox
        run: go install github.com/mitchellh/gox@latest

      - name: Build binaries
        run: |
          mkdir -p release/artifacts
          gox -osarch="linux/amd64 darwin/amd64 darwin/arm64 windows/amd64" \
            -ldflags="-X main.Version=${{ steps.version.outputs.VERSION }} -X main.Revision=${{ steps.version.outputs.REVISION }}" \
            --output="release/artifacts/vault-manager-{{.OS}}-{{.Arch}}" \
            .

      - name: Create archives
        run: |
          cd release/artifacts
          for f in vault-manager-linux-* vault-manager-darwin-*; do
            tar czf "${f}.tar.gz" "$f"
            rm "$f"
          done
          for f in vault-manager-windows-*; do
            zip "${f}.zip" "$f"
            rm "$f"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/artifacts/*.tar.gz
            release/artifacts/*.zip
